<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raya 2 - Selamat Hari Raya</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #c471ed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 20px 20px;
        }

        .container {
            background: white;
            padding: 30px 30px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 5px;
            font-size: 1.6em;
            font-family: 'Pacifico', cursive;
        }

        .qr-placeholder {
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            margin: 15px 0;
            display: inline-block;
        }

        .qr-placeholder img {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff9a9e 0%, #c471ed 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: 600;
            transform: translateX(-30px);
        }

        .back-btn:hover {
            transform: translateX(-35px) translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 113, 237, 0.4);
        }

        .floating-woman {
            position: fixed;
            bottom: 10px;
            right: 20px;
            width: 150px;
            height: auto;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Selamat Hari Raya Aidilfitri ✨</h1>

        <div class="qr-placeholder">
            <img src="raya-2.jpg" alt="QR Code">
        </div>

        <a href="index.html" class="back-btn">← Back Home</a>
    </div>

    <img src="woman-dabbing.png" alt="Welcome lady" class="floating-woman">
</body>
</html>
