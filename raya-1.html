<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raya 1 - Selamat Hari Raya</title>

    <!-- Cursive Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px 20px;
        }

        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 1.6em;
            font-family: 'Pacifico', cursive;
        }

        .logo {
            width: 80px;
            margin: 10px auto 20px;
            display: block;
        }

        .qr-placeholder {
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            margin: 30px 0;
            display: inline-block;
        }

        .qr-placeholder img {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: 600;

            /* Move slightly left */
            transform: translateX(-30px);
        }

        .back-btn:hover {
            transform: translateX(-20px) translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .floating-woman {
            position: fixed;
            bottom: 10px;
            right: 20px;
            width: 150px;
            height: auto;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✨ Selamat Hari Raya Aidilfitri ✨</h1>

        <!-- Logo Placeholder -->
        <img src="tng-logo.png" alt="TNG Logo" class="logo">

        <div class="qr-placeholder">
            <img src="1774058274762_100~2.jpg" alt="QR Code">
        </div>

        <a href="index.html" class="back-btn">← Back Home</a>
    </div>

    <img src="woman-welcome.png" alt="Welcome lady" class="floating-woman">
</body>
</html>
