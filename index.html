<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raya Money</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
        }

        h1 {
            color: #764ba2;
            font-size: 2em;
            margin-bottom: 8px;
            font-family: 'Pacifico', cursive;
        }

        .subtitle {
            color: #667eea;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 300px;
            margin-bottom: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .girl {
            width: 200px;
            max-width: 70%;
            animation: girlBounce 2.2s ease-in-out infinite;
            pointer-events: none;
            display: block;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            margin-top: -5px;
        }

        .btn {
            width: 80%;
            max-width: 280px;
            padding: 13px 0;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-1:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-2:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(245, 87, 108, 0.4);
        }

        @keyframes girlBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6em;
            }

            .subtitle {
                font-size: 0.95em;
            }

            .hero {
                height: 260px;
            }

            .girl {
                width: 170px;
            }

            .btn {
                width: 90%;
                font-size: 0.95em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✨ Money Money ✨</h1>
        <p class="subtitle">Duit raya begini begitu</p>

        <div class="hero">
            <img src="woman-money.png" alt="Raya mascot" class="girl">
        </div>

        <div class="buttons-container">
            <a href="raya-1.html" class="btn btn-1">Sekolah rendah</a>
            <a href="raya-2.html" class="btn btn-2">Sekolah menengah</a>
        </div>
    </div>
</body>
</html>
