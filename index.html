<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raya Money</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
        }

        h1 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: slideDown 0.6s ease-out;
            position: relative;
            z-index: 2;
        }

        .subtitle {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 28px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 2;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 330px;
            margin: 0 auto 24px;
            z-index: 1;
        }

        .girl {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 240px;
            max-width: 70%;
            z-index: 3;
            animation: girlBounce 2.2s ease-in-out infinite;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .money {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            z-index: 4;
            pointer-events: none;
            animation: throwMoney 3s linear infinite;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
        }

        .m1 { left: 48%; bottom: 175px; animation-delay: 0s; }
        .m2 { left: 49%; bottom: 190px; animation-delay: 0.35s; }
        .m3 { left: 50%; bottom: 180px; animation-delay: 0.7s; }
        .m4 { left: 47%; bottom: 195px; animation-delay: 1.05s; }
        .m5 { left: 51%; bottom: 185px; animation-delay: 1.4s; }
        .m6 { left: 48%; bottom: 200px; animation-delay: 1.75s; }
        .m7 { left: 50%; bottom: 188px; animation-delay: 2.1s; }

        .sparkle {
            position: absolute;
            color: #ffd54f;
            font-size: 1rem;
            opacity: 0.8;
            animation: twinkle 1.8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 2;
        }

        .s1 { top: 24px; left: 18%; animation-delay: 0s; }
        .s2 { top: 50px; right: 18%; animation-delay: 0.5s; }
        .s3 { top: 130px; left: 10%; animation-delay: 1s; }
        .s4 { top: 150px; right: 10%; animation-delay: 1.5s; }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-1:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .btn-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-2:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes girlBounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        @keyframes throwMoney {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            25% {
                transform: translate(-70px, -40px) rotate(-18deg) scale(0.85);
                opacity: 1;
            }
            45% {
                transform: translate(95px, -110px) rotate(25deg) scale(1);
                opacity: 1;
            }
            70% {
                transform: translate(-120px, -170px) rotate(-30deg) scale(0.95);
                opacity: 1;
            }
            100% {
                transform: translate(140px, -250px) rotate(45deg) scale(0.75);
                opacity: 0;
            }
        }

        @keyframes twinkle {
            from {
                transform: scale(0.9) rotate(0deg);
                opacity: 0.45;
            }
            to {
                transform: scale(1.2) rotate(18deg);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px 40px;
            }

            h1 {
                font-size: 1.7em;
            }

            .subtitle {
                font-size: 1em;
                margin-bottom: 18px;
            }

            .hero {
                height: 260px;
            }

            .girl {
                width: 190px;
                max-width: 78%;
            }

            .money {
                font-size: 1.6rem;
            }

            .btn {
                padding: 12px 28px;
                font-size: 1em;
            }

            .buttons-container {
                gap: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Money Money ✨</h1>
        <p class="subtitle">Duit duit.. pilih pilih~</p>

        <div class="hero">
            <div class="sparkle s1">✨</div>
            <div class="sparkle s2">✨</div>
            <div class="sparkle s3">✦</div>
            <div class="sparkle s4">✦</div>

            <img src="woman-money.png" alt="Raya mascot" class="girl">

            <span class="money m1">💸</span>
            <span class="money m2">💵</span>
            <span class="money m3">💸</span>
            <span class="money m4">💵</span>
            <span class="money m5">💸</span>
            <span class="money m6">💵</span>
            <span class="money m7">💸</span>
        </div>

        <div class="buttons-container">
            <a href="raya-1.html" class="btn btn-1">Sekolah rendah</a>
            <a href="raya-2.html" class="btn btn-2">Sekolah menengah</a>
        </div>
    </div>
</body>
</html>
